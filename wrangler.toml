# wrangler.toml — Cloudflare Workers Configuration

name = "earnradar-worker"
main = "worker.js"
compatibility_date = "2024-01-01"

# KV Namespace for caching fetched data
[[kv_namespaces]]
binding = "EARN_KV"
id = "YOUR_KV_NAMESPACE_ID"
preview_id = "YOUR_PREVIEW_KV_ID"

# Scheduled cron — run every hour
[triggers]
crons = ["0 * * * *"]

# Environment variables
[vars]
SITE_URL = "https://earnradar.pages.dev"

# Routes
[[routes]]
pattern = "earnradar.pages.dev/api/*"
zone_name = "pages.dev"
