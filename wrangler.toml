# wrangler.toml — EarnRadar Worker
# ====================================
# ملف إعدادات Cloudflare Workers
# بدون routes - بدون pages - بدون أخطاء
# ====================================

name = "earnradar-work"
main = "worker.js"
compatibility_date = "2024-01-01"

# تفعيل ضغط الكود لتجنب تجاوز حد 1MB
minify = true

# KV Namespace للتخزين المؤقت
[[kv_namespaces]]
binding = "EARN_KV"
id = "6112efe58e214de6a51a365522e6cd12"
preview_id = "6112efe58e214de6a51a365522e6cd12"

# Cron: جلب البيانات كل ساعة تلقائياً
[triggers]
crons = ["0 * * * *"]

# متغيرات البيئة
[vars]
SITE_URL = "https://earnradar-work.manasa.workers.dev"
